name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: |
          if node -e "process.exit(require('./package.json').scripts.test ? 0 : 1)"; then
            echo "Running tests..."
            bun run test
          else
            echo "No 'test' script found in package.json - skipping. (vitest is wired in Tier 1.5)"
          fi

      - name: Build
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Verify build output
        run: |
          [ -f .next/BUILD_ID ] || { echo "::error::Build output missing: .next/BUILD_ID not found"; exit 1; }
          echo "BUILD_ID: $(cat .next/BUILD_ID)"
